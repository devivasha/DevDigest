name: DevDigest Review
on:
  pull_request:
    types:
      - opened
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout (editable placeholder — swap for your own checkout step if
          needed)
        uses: actions/checkout@v4
      - name: Run DevDigest review
        run: node .devdigest/runner/index.js
        env:
          DEVDIGEST_POST_AS: github_review
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVDIGEST_INGEST_TOKEN: ${{ secrets.DEVDIGEST_INGEST_TOKEN }}
